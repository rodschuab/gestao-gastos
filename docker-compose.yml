version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: gestao-gastos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: gestao_gastos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao-gastos-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=gestao_gastos;Username=postgres;Password=postgres"
    ports:
      - "5000:8080"

volumes:
  postgres-data: